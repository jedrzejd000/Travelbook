<div class="main-background">
  <mat-card class="login-form">
    <mat-card-header>
      <img src="logo6.png" class="login-form-icon" alt="Logo">
    </mat-card-header>

    <mat-card-content>
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Hasło</mat-label>
        <input matInput type="password">
      </mat-form-field>

      <mat-card-actions>
        <button mat-raised-button class="primaryButton">Zaloguj</button>
        <button mat-raised-button class="primaryButton">Utwórz nowe konto</button>
      </mat-card-actions>

      <div class="forgot-password-link">
        <a href="#">Nie pamiętasz hasła? Kliknij tutaj</a>
      </div>
    </mat-card-content>
  </mat-card>
</div>
